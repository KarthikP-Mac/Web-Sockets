<div class="input-area-container">
    <!-- Typing Indicator -->
    <div class="typing-indicator-bar" [class.visible]="typingUser && typingUser !== currentUser">
    <div class="typing-bubble">
        <div class="bouncing-dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        </div>
        <span class="typing-text"><strong>{{ typingUser }}</strong> is typing...</span>
    </div>
    </div>

    <!-- Main Input Bar -->
    <form (ngSubmit)="onSubmit()" class="input-form">
    <div class="input-wrapper emoji-container">
        <input
        type="text"
        [(ngModel)]="messageText"
        name="messageText"
        (input)="onInput()"
        placeholder="Type your message here..."
        autocomplete="off"
        maxlength="200"
        />
        <button
        type="button"
        class="emoji-trigger"
        aria-label="Open emoji picker"
        (click)="toggleEmojiPicker($event)"
        >
            😊
        </button>
        <div class="emoji-dropdown" *ngIf="showEmojiPicker">
            <button
            type="button"
            class="emoji-btn"
            *ngFor="let emoji of emojis"
            (click)="addEmoji(emoji)"
            [attr.aria-label]="'Add ' + emoji"
            >
                {{ emoji }}
            </button>
        </div>
    </div>
    <button type="submit" class="send-btn" [disabled]="!messageText.trim()">
        <span class="send-icon">➔</span>
    </button>
    </form>
</div>
