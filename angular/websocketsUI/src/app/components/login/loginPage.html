<div class="login-container">
    <div class="login-card">
    <div class="header-section">
        <div class="logo-icon">💬</div>
        <h1>Join the Chatroom</h1>
        <p>Choose your username and avatar color to enter</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
        <label for="username">Username</label>
        <input
            type="text"
            id="username"
            name="username"
            [(ngModel)]="username"
            placeholder="e.g. KarthikP-Mac"
            name="ChatExplorer"
            [title]="'Username must be 3-15 characters to ChatExplorer'"
            required
            maxlength="15"
            autocomplete="off"
        />
        </div>

        <div class="form-group">
        <label>Choose Avatar Color</label>
        <div class="color-options">
            <button
            type="button"
            *ngFor="let color of colors"
            class="color-btn"
            [style.background]="color.value"
            [class.active]="selectedColor() === color.name"
            (click)="selectedColor.set(color.name)"
            [title]="color.name"
            >
            <span class="checkmark" *ngIf="selectedColor() === color.name">✓</span>
            </button>
        </div>
        </div>

        <button type="submit" class="submit-btn" [disabled]="!username.trim()">
        Get Started
        </button>

        <div class="share-link">
        <p>Invite others to this chat room: 😉</p>
        <div class="share-row">
            <input type="text" [value]="shareLink" [title]="shareLink" readonly />
            <button type="button" class="copy-btn" [title]="'Copy to Share Link!'" (click)="copyShareLink()">
            Copy Link
            </button>
        </div>
        <span class="share-status" *ngIf="shareStatus">{{ shareStatus }}</span>
        </div>
    </form>
    </div>
</div>
